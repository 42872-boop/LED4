<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Vision System</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
            width: 340px;
        }
        button {
            background: #007aff;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            width: 100%;
            cursor: pointer;
            margin-bottom: 20px;
            transition: background 0.2s;
        }
        button:hover {
            background: #0062cc;
        }
        button:disabled {
            background: #d1d1d6;
            cursor: not-allowed;
        }
        .video-wrapper {
            width: 280px;
            height: 280px;
            margin: 0 auto 20px;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
        }
        /* Native video element handling */
        #webcam {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Flips the video to act like a mirror */
        }
        .result-item {
            display: flex;
            justify-content: space-between;
            background: #f8f9fa;
            padding: 12px 16px;
            margin-bottom: 8px;
            border-radius: 10px;
            font-size: 15px;
            border-left: 4px solid #007aff;
        }
        .status {
            font-size: 13px;
            color: #8e8e93;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Native AI Vision</h2>
    <button type="button" id="btn" onclick="startSystem()">Start System</button>
    <div class="video-wrapper">
        <!-- Using native HTML5 Video tag instead of library-generated canvases -->
        <video id="webcam" autoplay playsinline muted></video>
    </div>
    <div id="label-container"></div>
    <div class="status" id="status" style="display:none;">🔄 AI predicting every 3 seconds</div>
</div>

<!-- Load TensorFlow and Teachable Machine Image Model Libraries Only -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script type="text/javascript">
    const MODEL_URL = "https://teachablemachine.withgoogle.com/models/OD2g-JJnk/";
    let model, maxPredictions, labelContainer;
    let predictionInterval;

    async function startSystem() {
        const btn = document.getElementById("btn");
        btn.disabled = true;
        btn.innerText = "Initializing...";

        try {
            // 1. Load the AI Model metadata
            model = await tmImage.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json");
            maxPredictions = model.getTotalClasses();

            // 2. Request native browser camera stream 
            const videoElement = document.getElementById("webcam");
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { width: 400, height: 400, facingMode: "user" },
                audio: false
            });
            
            // Link raw hardware camera feed directly into the video player element
            videoElement.srcObject = stream;

            // 3. Setup container UI rows for classes
            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = "";
            for (let i = 0; i < maxPredictions; i++) {
                let div = document.createElement("div");
                div.className = "result-item";
                labelContainer.appendChild(div);
            }

            document.getElementById("status").style.display = "block";
            btn.innerText = "System Active";

            // Run initial setup classification right away
            setTimeout(predict, 1000); 

            // 4. Fire prediction loop strictly every 3000ms independently
            predictionInterval = setInterval(predict, 3000);

        } catch (error) {
            console.error(error);
            alert("System Error: Either camera permissions were denied, or your browser is blocking camera access on local files. Try copying this code into CodePen.io!");
            btn.disabled = false;
            btn.innerText = "Try Again";
        }
    }

    async function predict() {
        const videoElement = document.getElementById("webcam");
        
        // Double check stream is running before passing frame data over to TensorFlow
        if (!model || !videoElement.srcObject) return;

        // Directly pass the native HTML5 video frame element into the machine learning engine
        const prediction = await model.predict(videoElement);
        
        for (let i = 0; i < maxPredictions; i++) {
            let percent = (prediction[i].probability * 100).toFixed(0);
            labelContainer.childNodes[i].innerHTML = `
                <span>${prediction[i].className}</span>
                <strong>${percent}%</strong>
            `;
        }
    }
</script>
</body>
</html>
