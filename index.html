<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine Image Model</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="bg-white rounded-2xl shadow-xl p-8 max-w-md w-full text-center border border-slate-100">
        <h1 class="text-2xl font-semibold text-slate-800 mb-1">Teachable Machine</h1>
        <p class="text-sm text-slate-400 mb-6">Image Classification Model (Updates every 3s)</p>
        
        <button type="button" id="start-btn" onclick="init()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 px-6 rounded-xl transition duration-200 shadow-md shadow-indigo-100 active:scale-[0.98]">
            Start Camera
        </button>

        <!-- Error Message Alert Box -->
        <div id="error-message" class="mt-4 p-3 bg-red-50 text-red-600 text-sm rounded-xl border border-red-100 hidden text-left font-medium"></div>

        <div id="webcam-container" class="mt-6 flex justify-center overflow-hidden rounded-xl bg-slate-100 border-2 border-dashed border-slate-200 aspect-square items-center hidden"></div>

        <div id="label-container" class="mt-6 space-y-3 text-left"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    
    <script type="text/javascript">
        // ⚠️ REPLACE THIS WITH YOUR SHAREABLE TEACHABLE MACHINE LINK ⚠️
        // Example: "https://teachablemachine.withgoogle.com/models/XXXXXX/"
        const URL = "./my_model/";[cite: 2]

        let model, webcam, labelContainer, maxPredictions;
        let isPredicting = false;

        function showError(message) {
            const errBox = document.getElementById("error-message");
            errBox.innerText = message;
            errBox.classList.remove("hidden");
            
            const startBtn = document.getElementById("start-btn");
            startBtn.disabled = false;
            startBtn.innerText = "Retry Start Camera";
            startBtn.className = "w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 px-6 rounded-xl transition duration-200 shadow-md";
        }

        async function init() {
            const startBtn = document.getElementById("start-btn");
            const errBox = document.getElementById("error-message");
            
            startBtn.disabled = true;
            startBtn.innerText = "Loading Model...";
            errBox.classList.add("hidden");

            try {
                const modelURL = URL + "model.json";[cite: 2]
                const metadataURL = URL + "metadata.json";[cite: 2]

                // 1. Try Loading the Model
                try {
                    model = await tmImage.load(modelURL, metadataURL);[cite: 2]
                    maxPredictions = model.getTotalClasses();[cite: 2]
                } catch (e) {
                    throw new Error("Failed to load model. Check if your model URL path is correct.");
                }

                // 2. Try Starting the Webcam
                try {
                    const flip = true;[cite: 2]
                    webcam = new tmImage.Webcam(350, 350, flip);[cite: 2]
                    await webcam.setup();[cite: 2]
                    await webcam.play();[cite: 2]
                } catch (e) {
                    throw new Error("Camera blocked or not found. Please grant webcam permissions to this page.");
                }
                
                // Render Webcam
                const webcamContainer = document.getElementById("webcam-container");
                webcamContainer.classList.remove("hidden");
                webcamContainer.innerHTML = ""; 
                webcamContainer.appendChild(webcam.canvas);[cite: 2]

                window.requestAnimationFrame(loop);[cite: 2]

                // Setup Progress Bars
                labelContainer = document.getElementById("label-container");[cite: 2]
                labelContainer.innerHTML = "";
                for (let i = 0; i < maxPredictions; i++) {[cite: 2]
                    const item = document.createElement("div");
                    item.className = "bg-slate-50 p-3 rounded-lg border border-slate-100";
                    item.innerHTML = `
                        <div class="flex justify-between text-sm font-medium text-slate-700 mb-1">
                            <span class="class-name">Ready...</span>
                            <span class="class-prob">0%</span>
                        </div>
                        <div class="w-full bg-slate-200 rounded-full h-2">
                            <div class="bg-indigo-600 h-2 rounded-full class-bar transition-all duration-300" style="width: 0%"></div>
                        </div>
                    `;
                    labelContainer.appendChild(item);[cite: 2]
                }

                startBtn.innerText = "System Running";
                startBtn.className = "w-full bg-emerald-600 text-white font-medium py-3 px-6 rounded-xl cursor-not-allowed opacity-85";

                // Initial Prediction
                await predict();

                // Safe interval executing every 3 seconds without race conditions
                setInterval(async () => {
                    if (!isPredicting) {
                        isPredicting = true;
                        await predict();
                        isPredicting = false;
                    }
                }, 3000);

            } catch (error) {
                showError(error.message);
            }
        }

        async function loop() {
            webcam.update();[cite: 2]
            window.requestAnimationFrame(loop);[cite: 2]
        }

        async function predict() {
            if (!model || !webcam) return;
            try {
                const prediction = await model.predict(webcam.canvas);[cite: 2]
                const items = labelContainer.childNodes;

                for (let i = 0; i < maxPredictions; i++) {[cite: 2]
                    const className = prediction[i].className;[cite: 2]
                    const probability = prediction[i].probability;[cite: 2]
                    const percentage = (probability * 100).toFixed(0);

                    items[i].querySelector(".class-name").innerText = className;
                    items[i].querySelector(".class-prob").innerText = percentage + "%";
                    items[i].querySelector(".class-bar").style.width = percentage + "%";
                }
            } catch (e) {
                console.error("Prediction error:", e);
            }
        }
    </script>
</body>
</html>
